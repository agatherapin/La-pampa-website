<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Exploration — LA PAMPA</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Surcharges spécifiques à cette page */
        body {
            cursor: grab;
        }
        body.dragging {
            cursor: grabbing;
        }

        /* Curseur spécifique world-exploration — modal géré par style.css */
    </style>
    <!-- Anti-flash thème -->
    <script>
        (function() {
            const stored = localStorage.getItem("lapampa-theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const theme = stored || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
</head>
<body>
    <a href="index.html" id="back-button">← Back</a>

    <canvas id="canvas"></canvas>

    <div id="loading">Chargement…</div>

    <div id="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">×</button>
            <div class="modal-inner">
                <div class="modal-image-col">
                    <div id="modal-gallery"></div>
                </div>
                <div class="modal-text-col">
                    <div id="modal-body"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="instructions">
        Glisser pour tourner &nbsp;·&nbsp; Scroll pour zoomer &nbsp;·&nbsp; Cliquer pour lire
    </div>

    <!-- Theme toggle + Recenter -->
    <button id="theme-toggle" title="Changer de thème">☾</button>
    <button id="recenter-btn" title="Recentrer">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.25"/>
            <circle cx="9" cy="9" r="3" stroke="currentColor" stroke-width="1.25"/>
        </svg>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://player.vimeo.com/api/player.js"></script>
    <script src="modal.js"></script>
    <script>
        // ── THEME ────────────────────────────────────────────
        const STORAGE_KEY = "lapampa-theme";

        function getTheme() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) return stored;
            return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            const btn = document.getElementById("theme-toggle");
            if (btn) btn.textContent = theme === "dark" ? "☀" : "☾";
            localStorage.setItem(STORAGE_KEY, theme);

            // Synchronise le fond Three.js avec le thème
            if (scene) {
                scene.background = new THREE.Color(theme === "dark" ? 0x0A0A0A : 0xF5F5F5);
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme");
            applyTheme(current === "dark" ? "light" : "dark");
        }

        document.getElementById("theme-toggle").addEventListener("click", toggleTheme);

        document.getElementById("recenter-btn").addEventListener("click", () => {
            targetRotationY = 0;
            targetRotationX = 0;
            targetCameraZ = 0;
        });

        // ── CHARGEMENT DES ARTICLES DEPUIS L'API ─────────────
        let articles = [];

        async function loadArticles() {
            try {
                const response = await fetch('/api/articles');
                articles = await response.json();
            } catch (error) {
                console.error('Erreur chargement articles:', error);
                document.getElementById('loading').textContent = 'Erreur de chargement…';
                return;
            }
            initScene();
        }

        loadArticles();

        // ── THREE.JS ─────────────────────────────────────────
        let scene, camera, renderer;
        const planes = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let loadedCount = 0;
        let isDragging = false;
        let previousMouseX = 0, previousMouseY = 0;
        let rotationY = 0, rotationX = 0;
        let targetRotationY = 0, targetRotationX = 0;
        let targetCameraZ = null;
        let introZoom = true;
        let startTime;

        function initScene() {
        const images = articles.map(a => ({
            title:       a.title,
            description: a.description,
            url:         a.image,
            content:     a.content,
            gallery:     a.gallery || [],
            video:       a.video || null
        }));

        scene = new THREE.Scene();
        const currentTheme = getTheme();
        scene.background = new THREE.Color(currentTheme === "dark" ? 0x0A0A0A : 0xF5F5F5);

        // Applique le thème initial après la création de la scène
        applyTheme(currentTheme);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 80;

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const loadingEl = document.getElementById('loading');

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        function isTooClose(newPos, existingPositions, minDistance) {
            for (let pos of existingPositions) {
                const d = Math.sqrt(
                    Math.pow(newPos.x - pos.x, 2) +
                    Math.pow(newPos.y - pos.y, 2) +
                    Math.pow(newPos.z - pos.z, 2)
                );
                if (d < minDistance) return true;
            }
            return false;
        }

        const positions = [];
        const minDistanceBetweenCards = 9;

        images.forEach((img) => {
            const shape = new THREE.Shape();
            const radius = 0.3;
            const w = 4.5, h = 4.5;

            shape.moveTo(-w/2 + radius, -h/2);
            shape.lineTo( w/2 - radius, -h/2);
            shape.quadraticCurveTo( w/2, -h/2,  w/2, -h/2 + radius);
            shape.lineTo( w/2,  h/2 - radius);
            shape.quadraticCurveTo( w/2,  h/2,  w/2 - radius,  h/2);
            shape.lineTo(-w/2 + radius,  h/2);
            shape.quadraticCurveTo(-w/2,  h/2, -w/2,  h/2 - radius);
            shape.lineTo(-w/2, -h/2 + radius);
            shape.quadraticCurveTo(-w/2, -h/2, -w/2 + radius, -h/2);

            const extrudeSettings = { depth: 0.1, bevelEnabled: false };
            const tempGeometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const tempMaterial = new THREE.MeshPhongMaterial({
                color: Math.random() * 0xffffff,
                emissive: 0x111111
            });
            const tempCube = new THREE.Mesh(tempGeometry, tempMaterial);

            let attempts = 0, validPosition = false, x, y, z;
            while (!validPosition && attempts < 100) {
                const distance = 17 + Math.random() * 10;
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.random() * Math.PI;
                const noiseX = (Math.random() - 0.5) * 3;
                const noiseY = (Math.random() - 0.5) * 3;
                const noiseZ = (Math.random() - 0.5) * 3;
                x = distance * Math.sin(phi) * Math.cos(theta) + noiseX;
                y = distance * Math.sin(phi) * Math.sin(theta) + noiseY;
                z = distance * Math.cos(phi) + noiseZ;
                const newPos = { x, y, z };
                if (!isTooClose(newPos, positions, minDistanceBetweenCards)) {
                    validPosition = true;
                    positions.push(newPos);
                } else {
                    attempts++;
                }
            }
            if (!validPosition) {
                const distance = 28 + Math.random() * 10;
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.random() * Math.PI;
                x = distance * Math.sin(phi) * Math.cos(theta);
                y = distance * Math.sin(phi) * Math.sin(theta);
                z = distance * Math.cos(phi);
                positions.push({ x, y, z });
            }

            tempCube.position.set(x, y, z);
            tempCube.lookAt(0, 0, 0);
            tempCube.userData = img;
            scene.add(tempCube);
            planes.push(tempCube);

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(
                img.url,
                (texture) => {
                    const planeGeometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                    const uvAttribute = planeGeometry.attributes.uv;
                    for (let i = 0; i < uvAttribute.count; i++) {
                        const u = (uvAttribute.getX(i) + w / 2) / w;
                        const v = (uvAttribute.getY(i) + h / 2) / h;
                        uvAttribute.setXY(i, u, v);
                    }
                    const imgAspect  = texture.image.width / texture.image.height;
                    const cardAspect = w / h;
                    if (imgAspect > cardAspect) {
                        texture.repeat.set(cardAspect / imgAspect, 1);
                        texture.offset.set((1 - cardAspect / imgAspect) / 2, 0);
                    } else {
                        texture.repeat.set(1, imgAspect / cardAspect);
                        texture.offset.set(0, (1 - imgAspect / cardAspect) / 2);
                    }
                    const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                    const plane = new THREE.Mesh(planeGeometry, material);
                    plane.position.copy(tempCube.position);
                    plane.rotation.copy(tempCube.rotation);
                    plane.userData = img;
                    scene.remove(tempCube);
                    const idx = planes.indexOf(tempCube);
                    if (idx > -1) planes[idx] = plane;
                    scene.add(plane);
                    loadedCount++;
                    if (loadedCount === images.length) loadingEl.style.display = 'none';
                },
                undefined,
                () => {
                    loadedCount++;
                    if (loadedCount === images.length) loadingEl.style.display = 'none';
                }
            );
        });

        // ── CONTRÔLES ────────────────────────────────────────
        startTime = Date.now();
        const zoomDuration = 2500;

        document.addEventListener('mousedown', (e) => {
            if (e.target.closest('#modal') || e.target.closest('#back-button') || e.target.closest('#theme-toggle')) return;
            isDragging = true;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
            document.body.classList.add('dragging');
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMouseX;
            const deltaY = e.clientY - previousMouseY;
            targetRotationY += deltaX * 0.005;
            targetRotationX += deltaY * 0.005;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.classList.remove('dragging');
        });

        document.addEventListener('wheel', (e) => {
            if (modal.classList.contains('active')) return;
            e.preventDefault();
            introZoom = false;
            targetCameraZ = null;
            camera.position.z += e.deltaY * 0.05;
            camera.position.z = Math.max(-15, Math.min(100, camera.position.z));
        }, { passive: false });

        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            if (e.target.closest('#modal')) return;
            isDragging = true;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - touchStartX;
            const deltaY = e.touches[0].clientY - touchStartY;
            targetRotationY += deltaX * 0.005;
            targetRotationX += deltaY * 0.005;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', () => { isDragging = false; });

        document.addEventListener('click', (e) => {
            if (isDragging || e.target.closest('#modal') || e.target.closest('#back-button') || e.target.closest('#theme-toggle')) return;
            mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planes);
            if (intersects.length > 0) {
                openModal(intersects[0].object.userData);
            }
        });

        // ── MODAL ─────────────────────────────────────────────
        const modal         = document.getElementById('modal');
        const closeModalBtn = document.getElementById('closeModal');

        function closeModal() { clearModal(); }

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        // ── ANIMATION ─────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            if (introZoom) {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / zoomDuration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                camera.position.z = 80 - (eased * 80);
                if (progress >= 1) introZoom = false;
            }
            rotationY += (targetRotationY - rotationY) * 0.1;
            rotationX += (targetRotationX - rotationX) * 0.1;
            scene.rotation.y = rotationY;
            scene.rotation.x = rotationX;
            if (targetCameraZ !== null) {
                camera.position.z += (targetCameraZ - camera.position.z) * 0.08;
                if (Math.abs(camera.position.z - targetCameraZ) < 0.05) {
                    camera.position.z = targetCameraZ;
                    targetCameraZ = null;
                }
            }
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        } // ← fin de initScene()
    </script>
</body>
</html>
